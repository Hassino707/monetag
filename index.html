<!DOCTYPE html>
<html>
<head>
<title>Please Wait...</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0d0d0d;
  font-family:Arial, sans-serif;
  color:#fff;
  text-align:center;
}

.container{
  padding:40px 20px;
}

.box{
  background:#1a1a1a;
  padding:25px;
  border-radius:12px;
  max-width:350px;
  margin:auto;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
}

h2{
  font-size:20px;
}

.progress-bar{
  width:100%;
  height:8px;
  background:#333;
  border-radius:5px;
  overflow:hidden;
  margin:20px 0;
}

.progress{
  height:100%;
  width:0%;
  background:#00ff99;
  transition:width 0.3s;
}

button{
  background:#00cc66;
  color:#fff;
  border:none;
  padding:14px 25px;
  font-size:16px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#00aa55;
}

.small{
  font-size:12px;
  color:#888;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="container">
  <div class="box">

    <h2 id="text">Checking your device security...
</h2>

    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

    <button onclick="go()">Verify Now</button>

<div class="small">Verifying secure connection...</div>

  </div>
</div>

<script>

// ✅ GET SUBID
let urlParams = new URLSearchParams(window.location.search);

let zoneid = urlParams.get("zoneid") || "0";
let device = urlParams.get("device") || "unknown";
let geo = urlParams.get("geo") || "XX";

let subid = zoneid + "_" + device + "_" + geo;


// ✅ MULTI OFFER (SPLIT TEST)
let selectedOffer = "https://omg10.com/4/10792509?subid=" + subid;


// ✅ FAKE PROGRESS BAR
let progress = 0;
let bar = document.getElementById("progress");
let text = document.getElementById("text");

let interval = setInterval(() => {
  progress += Math.random() * 8 + 5;


  if(progress >= 100){
    progress = 100;
    clearInterval(interval);

   text.innerHTML = "Secure connection verified ✔";
    
    // slight delay before redirect (feels natural)
    setTimeout(go, 800);
  }

  bar.style.width = progress + "%";

}, 500);


// ✅ ANTI-ADBLOCK DETECTION
function detectAdBlock(){
  let ad = document.createElement('div');
  ad.innerHTML = "&nbsp;";
  ad.className = "adsbox";
  document.body.appendChild(ad);

  setTimeout(function(){
    if(ad.offsetHeight === 0){
      // AdBlock detected → redirect differently
     text.innerHTML = "Please disable AdBlock to continue...";
    }
    ad.remove();
  }, 100);
}

detectAdBlock();
let btn = document.querySelector("button");
btn.disabled = true;

setTimeout(() => {
  btn.disabled = false;
}, 2000);


// ✅ MAIN REDIRECT
let redirected = false;

function go(){
  if(redirected) return;
  redirected = true;
  window.location.href = selectedOffer;
}


// ✅ AUTO REDIRECT BACKUP
setTimeout(() => {
  if(progress < 100){
    go();
  }
}, 7000);


</script>

</body>
</html>
